name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Fast gates (parallel) ─────────────────────────────────────────────
  validate:
    name: Validate spec & data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w @oneworld-explorer/core
      - run: npm run research:benchmark -- --min-recall=90 --quiet
      - run: npm run validate

  unit:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build -w @oneworld-explorer/core
      - run: npm run typecheck
      - run: npm test

  # ── Production build (must pass before ship gates) ───────────────────
  build:
    name: Production build
    runs-on: ubuntu-latest
    needs: [validate, unit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build

  # ── Ship gates: HTTP smoke + browser E2E ────────────────────────────
  smoke:
    name: HTTP smoke (ship gate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run test:smoke

  e2e:
    name: Browser E2E (ship gate)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npx playwright install chromium --with-deps
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Required aggregate check ─────────────────────────────────────────
  ci-pass:
    name: CI pass
    runs-on: ubuntu-latest
    needs: [validate, unit, build, smoke, e2e]
    steps:
      - run: echo "All CI gates passed — safe to ship v0.1 artifacts."
